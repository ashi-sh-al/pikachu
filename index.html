<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Changed: Better and cleaner title -->
    <title>Pikachu - Pokemon Gen 1</title>

    <link rel="stylesheet" href="./style.css" />
  </head>

  <body>
    <main class="main">
      <!-- Changed: Added meaningful alt text -->
      <img id="pikachu-img" src="./images/Pikachu.png" alt="Pikachu image" />

      <section class="main-left">
        <img id="pokemon-logo" src="./images/pokemon.png" alt="Pokemon logo" />

        <div class="main-left-text-box">
          <h4>Pokemon Gen <span>|</span></h4>

          <h1>Pikachu</h1>

          <p>
            Pikachu is an Electric-type Pokémon introduced in Generation I.
            Pikachu are small, chubby, and incredibly cute mouse-like Pokémon.
            <br />
            They are almost completely covered by yellow fur.
          </p>

          <div class="hr-line">
            <hr />
            <h5>01 / 08</h5>
          </div>
        </div>

        <div class="pokemon-ball-container">
          <img
            id="pokemon-ball"
            src="./images/pokemon-ball.png"
            alt="Pokemon ball"
          />
        </div>
      </section>

      <aside class="main-right">
        <img src="./images/menu-line.png" alt="Menu icon" />

        <div class="dots-container">
          <!-- Optimization: Repeated structure kept clean -->
          <div class="dot first-dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
      </aside>
    </main>
  </body>
</html>
